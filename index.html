<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunny Run | Catch the Rabbit</title>
  <meta name="description" content="A beautiful Three.js runner game developed by Munna Kumar.">
  <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">
  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <div id="world"></div>

  <div id="game-container">
    <!-- Start Screen -->
    <div id="start-overlay">
      <div id="start-modal">
        <h1>BUNNY RUN</h1>
        <p>Help the bunny escape the monster!</p>
        <p class="dev-credit">Developed by <strong>Munna Kumar</strong></p>
        <button id="start-btn">Start Game</button>
        <div class="instructions-hint">
          Click to jump — Grab the carrots / avoid the hedgehogs
        </div>
      </div>
    </div>

    <div id="dist">
      <div class="label">Distance</div>
      <div id="distValue">000</div>
    </div>

    <!-- Game Over Popup -->
    <div id="game-over-overlay">
      <div id="game-over-modal">
        <h1>GAME OVER</h1>
        <p>Your bunny got caught!</p>
        <div class="final-score">
          <span>Distance:</span>
          <span id="final-dist">000</span>
        </div>
        <button id="restart-btn">Try Again</button>
      </div>
    </div>

    <!-- Developer Info -->
    <div id="dev-info">
      Developed by <span class="dev-name">Munna Kumar</span>
    </div>
  </div>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r80/three.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.0/TweenMax.min.js'></script>
  <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/264161/OrbitControls.js'></script>
  <script src="./script.js"></script>

</body>

</html>
